// 運賃計算エンジン
// ═══════════════════════════════════════════════════════════════

function calcDistanceRate(regionId, vehicleIdx, km) {
  const region = DISTANCE_RATES[regionId];
  if (!region) return 0;

  // 沖縄の特殊処理
  if (regionId === "okinawa") {
    if (km <= 200) {
      const distances = Object.keys(region.base).map(Number).sort((a, b) => a - b);
      let targetKm = distances[distances.length - 1];
      for (const d of distances) {
        if (km <= d) {
          targetKm = d;
          break;
        }
      }
      return region.base[targetKm][vehicleIdx];
    } else {
      const base200 = region.base[200][vehicleIdx];
      const overKm = km - 200;
      const steps = Math.ceil(overKm / 10);
      return base200 + steps * region.add200plus[vehicleIdx];
    }
  }

  // 他地域
  if (km <= 200) {
    const distances = Object.keys(region.base).map(Number).sort((a, b) => a - b);
    let targetKm = distances[distances.length - 1];
    for (const d of distances) {
      if (km <= d) {
        targetKm = d;
        break;
      }
    }
    return region.base[targetKm][vehicleIdx];
  } else if (km <= 500) {
    const base200 = region.base[200][vehicleIdx];
    const overKm = km - 200;
    const steps = Math.ceil(overKm / 20);
    return base200 + steps * region.add200to500[vehicleIdx];
  } else {
    const base200 = region.base[200][vehicleIdx];
    const steps200to500 = 15; // (500-200)/20
    const base500 = base200 + steps200to500 * region.add200to500[vehicleIdx];
